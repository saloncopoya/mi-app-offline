<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8"/>
    <title>Legado Avicola App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover, shrink-to-fit=no"/>
    <meta name="referrer" content="origin"/>
    <meta name="mobile-web-app-capable" content="yes"/>
    <meta name="theme-color" content="#8B4513"/>
    <meta name="description" content="Legado Avicola - Red Social Gallística"/>
    <link rel="manifest" href="manifest.json"/>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #8B4513; }
        iframe { width: 100%; height: 100%; border: none; background: white; }
        .loading-message {
            position: absolute; top: 0; right: 0; bottom: 0; left: 0; z-index: 999;
            display: flex; align-items: center; justify-content: center;
            background: #8B4513;
        }
        .loading-message span {
            background: rgba(0,0,0,0.7); border-radius: 5px; padding: 0.8em 1.2em;
            color: white; font-size: 1.3em; font-family: system-ui, sans-serif;
        }
        #root { height: 100%; }
    </style>
</head>
<body>
    <div id="root">
        <div class="loading-message"><span>Cargando...</span></div>
    </div>

    <!-- ESTE ES EL SERVICE WORKER DE EXCALIDRAW (usando pwacompat) -->
    <script async src="https://unpkg.com/pwacompat@2.0.9/pwacompat.min.js"
        integrity="sha384-hVn9tTvI6Kj4KKlQfGGL/RA5mY7mY0K1NtJ+pnVNb/O2Rkmc2KULfTZV/hFhCFO/"
        crossorigin="anonymous"></script>
    
    <script>
        // Cargar iframe con tu blog
        window.addEventListener('load', () => {
            const root = document.getElementById('root');
            const iframe = document.createElement('iframe');
            iframe.src = 'https://legadoavicola.blogspot.com/';
            iframe.style.width = '100%';
            iframe.style.height = '100%';
            iframe.style.border = 'none';
            root.innerHTML = '';
            root.appendChild(iframe);
            
            iframe.onload = () => {
                const loading = document.querySelector('.loading-message');
                if (loading) loading.style.display = 'none';
            };
        });
        
        // Registrar Service Worker (estilo Excalidraw)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('✅ SW registrado:', reg.scope))
                    .catch(err => console.log('❌ Error SW:', err));
            });
        }
    </script>
</body>
</html>
