<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Mi Blog Offline</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#8B4513">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #f0f0f0;
        }
        
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: white;
        }
        
        .offline-badge {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-family: sans-serif;
            font-size: 12px;
            z-index: 9999;
            pointer-events: none;
            backdrop-filter: blur(10px);
            display: none;
        }
        
        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: sans-serif;
            color: #666;
        }
    </style>
</head>
<body>
    <!-- IFRAME: Contenedor de tu blog -->
    <iframe id="blogFrame" src="about:blank"></iframe>
    <div class="offline-badge" id="offlineBadge">📴 Modo Offline</div>
    <div class="loading" id="loading">Cargando...</div>

    <script>
        const BLOG_URL = 'https://legadoavicola.blogspot.com/'; // 👈 CAMBIA AQUÍ LA URL DE TU BLOG
        const iframe = document.getElementById('blogFrame');
        const offlineBadge = document.getElementById('offlineBadge');
        const loading = document.getElementById('loading');
        
        // Función para cargar el blog en el iframe
        function loadBlog() {
            loading.style.display = 'block';
            
            // Intentar cargar el blog desde el cache o red
            iframe.src = BLOG_URL;
            
            // Ocultar loading después de que cargue
            iframe.onload = function() {
                loading.style.display = 'none';
            };
            
            // Timeout por si tarda mucho
            setTimeout(() => {
                loading.style.display = 'none';
            }, 5000);
        }
        
        // Detectar estado online/offline
        function updateOnlineStatus() {
            if (!navigator.onLine) {
                offlineBadge.style.display = 'block';
                console.log('📴 Modo offline - usando contenido cacheado');
            } else {
                offlineBadge.style.display = 'none';
                console.log('🌐 Online - contenido actualizado');
            }
        }
        
        // Registrar Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(registration => {
                    console.log('✅ Service Worker registrado:', registration.scope);
                    
                    // Forzar actualización
                    registration.update();
                    
                    // Escuchar mensajes del SW
                    navigator.serviceWorker.addEventListener('message', event => {
                        console.log('Mensaje del SW:', event.data);
                    });
                })
                .catch(error => {
                    console.log('❌ Error al registrar SW:', error);
                });
        }
        
        // Escuchar cambios de conexión
        window.addEventListener('online', () => {
            updateOnlineStatus();
            loadBlog(); // Recargar cuando vuelve internet
        });
        
        window.addEventListener('offline', updateOnlineStatus);
        
        // Inicializar
        updateOnlineStatus();
        loadBlog();
    </script>
</body>
</html>
