<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Mi Blog Offline</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #fff;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .offline-message {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-family: sans-serif;
            font-size: 14px;
            z-index: 999;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <!-- El iframe cargará tu blog -->
    <iframe id="blogFrame" src="https://legadoavicola.blogspot.com"></iframe>
    <div id="offlineIndicator" class="offline-message" style="display:none;">📴 Modo offline - Contenido guardado</div>

    <script>
        // CAMBIA ESTA URL POR LA DE TU BLOG DE BLOGGER
        const BLOG_URL = 'https://legadoavicola.blogspot.com';
        const iframe = document.getElementById('blogFrame');
        const offlineIndicator = document.getElementById('offlineIndicator');
        
        // Detectar si estamos offline
        function updateOnlineStatus() {
            if (!navigator.onLine) {
                offlineIndicator.style.display = 'block';
                // Recargar iframe para que use el cache
                iframe.src = iframe.src;
            } else {
                offlineIndicator.style.display = 'none';
            }
        }
        
        window.addEventListener('online', updateOnlineStatus);
        window.addEventListener('offline', updateOnlineStatus);
        updateOnlineStatus();
        
        // Asegurar que el iframe se cargue siempre (cache o red)
        iframe.src = BLOG_URL;
    </script>
</body>
</html>
