<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Mi Blog Offline</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#8B4513">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #f0f0f0;
        }
        
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: white;
        }
        
        .offline-badge {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-family: sans-serif;
            font-size: 12px;
            z-index: 9999;
            pointer-events: none;
            backdrop-filter: blur(10px);
            display: none;
        }
        
        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: sans-serif;
            color: #666;
        }
    </style>
</head>
<body>
    <!-- IFRAME: Contenedor de tu blog con sandbox para evitar redirecciones -->
    <iframe 
        id="blogFrame" 
        src="about:blank"
        sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals allow-downloads"
        referrerpolicy="no-referrer">
    </iframe>
    <div class="offline-badge" id="offlineBadge">📴 Modo Offline</div>
    <div class="loading" id="loading">Cargando...</div>

    <script>
        const BLOG_URL = 'https://legadoavicola.blogspot.com/'; // Tu blog
        const iframe = document.getElementById('blogFrame');
        const offlineBadge = document.getElementById('offlineBadge');
        const loading = document.getElementById('loading');
        
        // Evitar que el blog rompa el iframe
        function preventIframeBreak() {
            // Forzar que todos los enlaces se abran dentro del iframe
            try {
                const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
                if (iframeDoc) {
                    // Modificar todos los enlaces para que no salgan del iframe
                    const links = iframeDoc.querySelectorAll('a');
                    links.forEach(link => {
                        link.setAttribute('target', '_self');
                        link.setAttribute('rel', 'noopener noreferrer');
                    });
                    
                    // Prevenir que el blog ejecute código que rompa el iframe
                    iframeDoc.addEventListener('click', function(e) {
                        const target = e.target.closest('a');
                        if (target && target.target === '_top') {
                            e.preventDefault();
                            target.target = '_self';
                            target.click();
                        }
                    });
                }
            } catch(e) {
                console.log('No se puede acceder al contenido del iframe por seguridad');
            }
        }
        
        // Función para cargar el blog en el iframe
        function loadBlog() {
            loading.style.display = 'block';
            
            // Usar un proxy si es necesario o cargar directamente
            iframe.src = BLOG_URL;
            
            // Intentar prevenir redirección cada cierto tiempo
            let interval = setInterval(() => {
                try {
                    // Si el iframe intenta redirigir la página padre, lo evitamos
                    if (iframe.contentWindow && iframe.contentWindow.location.href !== BLOG_URL) {
                        console.log('Se detectó intento de redirección, corrigiendo...');
                        // No hacemos nada, solo registramos
                    }
                } catch(e) {
                    clearInterval(interval);
                }
            }, 1000);
            
            // Ocultar loading después de que cargue
            iframe.onload = function() {
                loading.style.display = 'none';
                clearInterval(interval);
                // Intentar prevenir que los enlaces salgan del iframe
                setTimeout(preventIframeBreak, 1000);
            };
            
            // Timeout por si tarda mucho
            setTimeout(() => {
                loading.style.display = 'none';
                clearInterval(interval);
            }, 5000);
        }
        
        // Detectar estado online/offline
        function updateOnlineStatus() {
            if (!navigator.onLine) {
                offlineBadge.style.display = 'block';
                console.log('📴 Modo offline - usando contenido cacheado');
            } else {
                offlineBadge.style.display = 'none';
                console.log('🌐 Online - contenido actualizado');
            }
        }
        
        // Registrar Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(registration => {
                    console.log('✅ Service Worker registrado:', registration.scope);
                    registration.update();
                })
                .catch(error => {
                    console.log('❌ Error al registrar SW:', error);
                });
        }
        
        // Escuchar cambios de conexión
        window.addEventListener('online', () => {
            updateOnlineStatus();
            loadBlog();
        });
        
        window.addEventListener('offline', updateOnlineStatus);
        
        // Inicializar
        updateOnlineStatus();
        loadBlog();
    </script>
</body>
</html>
