<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8"/>
    <title>Mi App PWA</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover, shrink-to-fit=no"/>
    <meta name="referrer" content="origin"/>
    <meta name="mobile-web-app-capable" content="yes"/>
    <meta name="theme-color" content="#000000"/>
    <meta name="description" content="Mi PWA App"/>
    <link rel="manifest" href="manifest.json"/>
    <link rel="shortcut icon" href="icon-192.png" type="image/png"/>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #ffffff;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        #root {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            padding: 20px;
            max-width: 600px;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 1rem;
            color: #333;
        }
        p {
            font-size: 1.1rem;
            color: #666;
            line-height: 1.5;
        }
        .offline-badge {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            z-index: 9999;
            display: none;
        }
        .loading-message {
            position: absolute;
            top: 0;
            right: 0;
            bottom: 0;
            left: 0;
            z-index: 999;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
        }
        .loading-message span {
            background: #f0f0f0;
            border-radius: 5px;
            padding: 0.8em 1.2em;
            color: #333;
            font-size: 1.3em;
        }
        .visually-hidden {
            position: absolute !important;
            height: 1px;
            width: 1px;
            overflow: hidden;
            clip: rect(1px, 1px, 1px, 1px);
            white-space: nowrap;
            user-select: none;
        }
    </style>
</head>
<body>
    <noscript>Necesitas habilitar JavaScript para ejecutar esta app.</noscript>
    <header>
        <h1 class="visually-hidden">Mi App PWA</h1>
    </header>
    <div id="root">
        <div class="loading-message">
            <span>Cargando...</span>
        </div>
    </div>

    <!-- PWACOMPAT: La misma librería que usa Excalidraw -->
    <script async src="https://unpkg.com/pwacompat@2.0.9/pwacompat.min.js"
        integrity="sha384-hVn9tTvI6Kj4KKlQfGGL/RA5mY7mY0K1NtJ+pnVNb/O2Rkmc2KULfTZV/hFhCFO/"
        crossorigin="anonymous"></script>
    
    <script>
        // Contenido principal de tu app
        window.addEventListener('load', () => {
            const root = document.getElementById('root');
            
            // Aquí puedes poner TU contenido
            root.innerHTML = `
                <div class="container">
                    <h1>🚀 Mi App PWA</h1>
                    <p>Esta es una PWA instalable que funciona offline.</p>
                    <p>✨ Puedes personalizar este contenido</p>
                    <p>📱 Instala la app desde el botón inferior</p>
                </div>
            `;
            
            const loading = document.querySelector('.loading-message');
            if (loading) loading.style.display = 'none';
        });
        
        // Detectar estado offline/online
        function updateOnlineStatus() {
            const badge = document.getElementById('offlineBadge');
            if (!navigator.onLine) {
                if (!badge) {
                    const newBadge = document.createElement('div');
                    newBadge.id = 'offlineBadge';
                    newBadge.className = 'offline-badge';
                    newBadge.textContent = '📴 Modo Offline';
                    document.body.appendChild(newBadge);
                } else {
                    badge.style.display = 'block';
                }
                console.log('📴 Modo offline');
            } else {
                if (badge) badge.style.display = 'none';
                console.log('🌐 Online');
            }
        }
        
        // Registrar Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('✅ SW registrado:', reg.scope))
                    .catch(err => console.log('❌ Error SW:', err));
            });
        }
        
        // Escuchar cambios de conexión
        window.addEventListener('online', updateOnlineStatus);
        window.addEventListener('offline', updateOnlineStatus);
        updateOnlineStatus();
        
        // Evento cuando se instala la app
        window.addEventListener('appinstalled', () => {
            console.log('✅ App instalada exitosamente');
        });
    </script>
</body>
</html>
