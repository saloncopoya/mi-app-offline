<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Legado Avicola - Social</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#8B4513">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #8B4513;
        }
        
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: white;
        }
        
        .offline-badge {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-family: sans-serif;
            font-size: 12px;
            z-index: 9999;
            pointer-events: none;
            backdrop-filter: blur(10px);
            display: none;
        }
        
        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: sans-serif;
            color: white;
            background: rgba(0,0,0,0.7);
            padding: 12px 24px;
            border-radius: 30px;
            z-index: 9999;
        }
    </style>
</head>
<body>
    <iframe id="blogFrame" src="about:blank"></iframe>
    <div class="offline-badge" id="offlineBadge">📴 Modo Offline</div>
    <div class="loading" id="loading">Cargando...</div>

    <script>
        const BLOG_URL = 'https://legadoavicola.blogspot.com/';
        const iframe = document.getElementById('blogFrame');
        const offlineBadge = document.getElementById('offlineBadge');
        const loading = document.getElementById('loading');
        
        function loadBlog() {
            loading.style.display = 'block';
            iframe.src = BLOG_URL;
            
            iframe.onload = function() {
                loading.style.display = 'none';
            };
            
            setTimeout(() => {
                loading.style.display = 'none';
            }, 5000);
        }
        
        function updateOnlineStatus() {
            if (!navigator.onLine) {
                offlineBadge.style.display = 'block';
                console.log('📴 Offline - usando cache');
            } else {
                offlineBadge.style.display = 'none';
                console.log('🌐 Online');
            }
        }
        
        // Registrar Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(reg => {
                    console.log('✅ SW registrado:', reg.scope);
                    
                    // Verificar si hay actualización
                    reg.addEventListener('updatefound', () => {
                        const newWorker = reg.installing;
                        console.log('🔄 Nueva versión del SW encontrando');
                        newWorker.addEventListener('statechange', () => {
                            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                console.log('✅ Nueva versión lista, recarga para actualizar');
                            }
                        });
                    });
                })
                .catch(err => console.log('❌ Error SW:', err));
            
            // Escuchar cambios de conexión
            navigator.serviceWorker.addEventListener('message', (event) => {
                console.log('Mensaje del SW:', event.data);
            });
        }
        
        window.addEventListener('online', () => {
            updateOnlineStatus();
            loadBlog();
        });
        
        window.addEventListener('offline', updateOnlineStatus);
        
        updateOnlineStatus();
        loadBlog();
        
        // Detectar cuando la app está instalada
        window.addEventListener('appinstalled', () => {
            console.log('✅ App instalada exitosamente');
        });
    </script>
</body>
</html>
